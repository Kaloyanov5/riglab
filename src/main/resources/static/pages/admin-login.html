<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RigLab - Admin Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="header-brand">
        <a href="/" class="brand-link">
            <span class="logo">&#9881;</span>
            <h1>RigLab</h1>
        </a>
    </div>
    <nav class="nav">
        <a href="/" class="nav-btn">Build</a>
        <a href="/pages/components.html" class="nav-btn">Components</a>
        <a href="/pages/admin.html" class="nav-btn active">Admin</a>
    </nav>
</header>

<main class="admin-login-page">
    <div class="login-card">
        <div class="login-icon">&#128274;</div>
        <h2>Admin Login</h2>
        <p class="login-subtitle">Sign in to manage components</p>

        <div id="login-error" class="login-error hidden"></div>
        <div id="login-success" class="login-success hidden"></div>

        <form id="login-form" action="/api/admin/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="input" required autofocus placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary login-btn">Sign In</button>
        </form>

        <a href="/" class="login-back">&larr; Back to RigLab</a>
    </div>
</main>

<script>
    // Show error/success messages from URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'true') {
        const el = document.getElementById('login-error');
        el.textContent = 'Invalid username or password.';
        el.classList.remove('hidden');
    }
    if (params.get('logout') === 'true') {
        const el = document.getElementById('login-success');
        el.textContent = 'You have been logged out.';
        el.classList.remove('hidden');
    }
</script>
</body>
</html>
