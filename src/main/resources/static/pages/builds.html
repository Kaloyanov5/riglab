<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RigLab - My Builds</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
    <div class="header-brand">
        <a href="/" class="brand-link">
            <img src="/assets/riglab.svg" alt="RigLab" class="brand-logo">
        </a>
    </div>
    <nav class="nav">
        <a href="/" class="nav-btn">Build</a>
        <a href="/pages/components.html" class="nav-btn">Components</a>
        <a href="/pages/admin.html" class="nav-btn">Admin</a>
    </nav>
</header>

<div id="toast-container"></div>

<main class="builds-page">
    <div class="builds-header">
        <h2><i data-lucide="layout-grid" class="icon"></i>My Saved Builds</h2>
        <a href="/" class="btn btn-primary"><i data-lucide="plus"></i><span>New Build</span></a>
    </div>

    <div id="builds-loading" class="loading">
        <div class="spinner"></div>
        <p>Loading your builds…</p>
    </div>

    <div id="builds-empty" class="empty-state hidden">
        <div class="empty-icon"><i data-lucide="package-open"></i></div>
        <h3>No builds yet</h3>
        <p>Configure a PC on the home page and click <strong>Save Build</strong> to keep it here.</p>
        <a href="/" class="btn btn-primary"><i data-lucide="cpu"></i><span>Start configuring</span></a>
    </div>

    <div id="builds-list" class="builds-grid hidden"></div>
</main>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/builds.js"></script>
</body>
</html>
