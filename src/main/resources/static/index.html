<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RigLab - PC Build Configurator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-brand">
        <span class="logo">&#9881;</span>
        <h1>RigLab</h1>
    </div>
    <nav class="nav">
        <button class="nav-btn active" data-tab="components">Components</button>
        <button class="nav-btn" data-tab="builds">Builds</button>
    </nav>
</header>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Components Section -->
<main id="tab-components" class="tab-content active">
    <div class="toolbar">
        <div class="toolbar-left">
            <h2>Components</h2>
            <select id="filter-type" class="input">
                <option value="">All Types</option>
                <option value="CPU">CPU</option>
                <option value="GPU">GPU</option>
                <option value="MOTHERBOARD">Motherboard</option>
                <option value="RAM">RAM</option>
                <option value="PSU">PSU</option>
                <option value="CASE">Case</option>
                <option value="COOLER">Cooler</option>
                <option value="STORAGE">Storage</option>
            </select>
            <input type="text" id="search-name" class="input" placeholder="Search by name...">
        </div>
        <button class="btn btn-primary" id="btn-add-component">+ Add Component</button>
    </div>

    <div id="components-list" class="card-grid">
        <!-- Dynamically populated -->
    </div>
</main>

<!-- Builds Section -->
<main id="tab-builds" class="tab-content">
    <div class="toolbar">
        <div class="toolbar-left">
            <h2>Builds</h2>
        </div>
        <button class="btn btn-primary" id="btn-add-build">+ New Build</button>
    </div>

    <div id="builds-list" class="card-grid">
        <!-- Dynamically populated -->
    </div>
</main>

<!-- Component Modal -->
<div id="component-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h3 id="component-modal-title">Add Component</h3>
            <button class="modal-close" data-close="component-modal">&times;</button>
        </div>
        <form id="component-form" class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-name">Name *</label>
                    <input type="text" id="comp-name" class="input" required>
                </div>
                <div class="form-group">
                    <label for="comp-brand">Brand *</label>
                    <input type="text" id="comp-brand" class="input" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-type">Type *</label>
                    <select id="comp-type" class="input" required>
                        <option value="">Select type</option>
                        <option value="CPU">CPU</option>
                        <option value="GPU">GPU</option>
                        <option value="MOTHERBOARD">Motherboard</option>
                        <option value="RAM">RAM</option>
                        <option value="PSU">PSU</option>
                        <option value="CASE">Case</option>
                        <option value="COOLER">Cooler</option>
                        <option value="STORAGE">Storage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comp-price">Price ($)</label>
                    <input type="number" id="comp-price" class="input" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label for="comp-power">Power (W)</label>
                    <input type="number" id="comp-power" class="input" min="0">
                </div>
            </div>

            <!-- Dynamic detail fields -->
            <div id="detail-fields"></div>

            <input type="hidden" id="comp-edit-id">
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close="component-modal">Cancel</button>
                <button type="submit" class="btn btn-primary" id="comp-submit-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- Build Modal -->
<div id="build-modal" class="modal-overlay hidden">
    <div class="modal modal-wide">
        <div class="modal-header">
            <h3 id="build-modal-title">New Build</h3>
            <button class="modal-close" data-close="build-modal">&times;</button>
        </div>
        <form id="build-form" class="modal-body">
            <div class="form-group">
                <label for="build-name">Build Name *</label>
                <input type="text" id="build-name" class="input" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="build-cpu">CPU *</label>
                    <select id="build-cpu" class="input" required></select>
                </div>
                <div class="form-group">
                    <label for="build-gpu">GPU</label>
                    <select id="build-gpu" class="input"></select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="build-motherboard">Motherboard *</label>
                    <select id="build-motherboard" class="input" required></select>
                </div>
                <div class="form-group">
                    <label for="build-psu">PSU *</label>
                    <select id="build-psu" class="input" required></select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="build-case">Case *</label>
                    <select id="build-case" class="input" required></select>
                </div>
            </div>

            <div class="form-group">
                <label>RAM * <small>(hold Ctrl to select multiple)</small></label>
                <select id="build-ram" class="input" multiple required></select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Storage <small>(hold Ctrl to select multiple)</small></label>
                    <select id="build-storage" class="input" multiple></select>
                </div>
                <div class="form-group">
                    <label>Coolers <small>(hold Ctrl to select multiple)</small></label>
                    <select id="build-cooler" class="input" multiple></select>
                </div>
            </div>

            <input type="hidden" id="build-edit-id">
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close="build-modal">Cancel</button>
                <button type="submit" class="btn btn-primary" id="build-submit-btn">Create Build</button>
            </div>
        </form>
    </div>
</div>

<!-- Build Detail Modal -->
<div id="build-detail-modal" class="modal-overlay hidden">
    <div class="modal modal-wide">
        <div class="modal-header">
            <h3 id="build-detail-title">Build Details</h3>
            <button class="modal-close" data-close="build-detail-modal">&times;</button>
        </div>
        <div id="build-detail-body" class="modal-body">
            <!-- Dynamically populated -->
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
