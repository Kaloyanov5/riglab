<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RigLab - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-brand">
        <a href="/" class="brand-link">
            <span class="logo">&#9881;</span>
            <h1>RigLab</h1>
        </a>
        <span class="admin-badge">ADMIN</span>
    </div>
    <nav class="nav">
        <a href="/" class="nav-btn">Build</a>
        <a href="/components.html" class="nav-btn">Components</a>
        <a href="/admin.html" class="nav-btn active">Admin</a>
        <form action="/api/admin/logout" method="POST" style="display:inline;">
            <button type="submit" class="nav-btn nav-btn-logout">Logout</button>
        </form>
    </nav>
</header>

<div id="toast-container"></div>

<main class="admin-main">
    <div class="admin-header">
        <div>
            <h2>&#128736; Component Management</h2>
            <p class="admin-subtitle">Add, edit, and delete PC components</p>
        </div>
        <button class="btn btn-primary" id="btn-add-component">+ Add Component</button>
    </div>

    <!-- Filters bar -->
    <div class="admin-filters">
        <select id="admin-type-filter" class="input">
            <option value="">All Types</option>
            <option value="CPU">CPU</option>
            <option value="GPU">GPU</option>
            <option value="MOTHERBOARD">Motherboard</option>
            <option value="RAM">RAM</option>
            <option value="PSU">PSU</option>
            <option value="CASE">Case</option>
            <option value="COOLER">Cooler</option>
            <option value="STORAGE">Storage</option>
        </select>
        <input type="text" id="admin-search" class="input" placeholder="Search by name...">
        <span class="admin-count" id="admin-count"></span>
    </div>

    <!-- Components table -->
    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Type</th>
                    <th>Price</th>
                    <th>Power</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-tbody">
                <tr><td colspan="7" class="admin-loading"><div class="spinner"></div> Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="admin-pagination"></div>
</main>

<!-- Component Modal (same as before) -->
<div id="component-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h3 id="component-modal-title">Add Component</h3>
            <button class="modal-close" data-close="component-modal">&times;</button>
        </div>
        <form id="component-form" class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-name">Name *</label>
                    <input type="text" id="comp-name" class="input" required>
                </div>
                <div class="form-group">
                    <label for="comp-brand">Brand *</label>
                    <input type="text" id="comp-brand" class="input" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-type">Type *</label>
                    <select id="comp-type" class="input" required>
                        <option value="">Select type</option>
                        <option value="CPU">CPU</option>
                        <option value="GPU">GPU</option>
                        <option value="MOTHERBOARD">Motherboard</option>
                        <option value="RAM">RAM</option>
                        <option value="PSU">PSU</option>
                        <option value="CASE">Case</option>
                        <option value="COOLER">Cooler</option>
                        <option value="STORAGE">Storage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comp-price">Price ($)</label>
                    <input type="number" id="comp-price" class="input" step="0.01" min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-power">Power (W)</label>
                    <input type="number" id="comp-power" class="input" min="0">
                </div>
                <div class="form-group">
                    <label for="comp-image">Image URL</label>
                    <input type="url" id="comp-image" class="input" placeholder="https://...">
                </div>
            </div>

            <!-- Dynamic detail fields -->
            <div id="detail-fields"></div>

            <input type="hidden" id="comp-edit-id">
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close="component-modal">Cancel</button>
                <button type="submit" class="btn btn-primary" id="comp-submit-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
