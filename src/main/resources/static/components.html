<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RigLab - Components</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-brand">
        <a href="/" class="brand-link">
            <span class="logo">&#9881;</span>
            <h1>RigLab</h1>
        </a>
    </div>
    <nav class="nav">
        <a href="/" class="nav-btn">Build</a>
        <a href="/components.html" class="nav-btn active">Components</a>
    </nav>
</header>

<div id="toast-container"></div>

<div class="components-layout">
    <!-- Sidebar Filters -->
    <aside class="filter-sidebar" id="filter-sidebar">
        <div class="filter-header">
            <h3>Filters</h3>
        </div>

        <!-- Category filters (level 1) -->
        <div id="filter-categories" class="filter-section">
            <h4>Category</h4>
            <button class="filter-cat-btn active" data-type="">All Components</button>
            <button class="filter-cat-btn" data-type="CPU">CPU</button>
            <button class="filter-cat-btn" data-type="GPU">GPU</button>
            <button class="filter-cat-btn" data-type="MOTHERBOARD">Motherboard</button>
            <button class="filter-cat-btn" data-type="RAM">RAM</button>
            <button class="filter-cat-btn" data-type="PSU">PSU</button>
            <button class="filter-cat-btn" data-type="CASE">Case</button>
            <button class="filter-cat-btn" data-type="COOLER">Cooler</button>
            <button class="filter-cat-btn" data-type="STORAGE">Storage</button>
        </div>

        <!-- Type-specific filters (level 2, shown when a category is selected) -->
        <div id="filter-details" class="filter-section hidden">
            <button class="filter-back-btn" id="btn-filter-back">&larr; Back</button>
            <div id="detail-filter-fields"></div>
        </div>

        <div class="filter-section">
            <h4>Search</h4>
            <input type="text" id="search-name" class="input filter-input" placeholder="Search by name...">
        </div>

        <div class="filter-section">
            <h4>Price Range</h4>
            <div class="price-range-filter">
                <div class="price-range-inputs">
                    <input type="number" id="price-min" class="input filter-input price-range-input" placeholder="Min $" min="0" step="1">
                    <span class="price-range-sep">&ndash;</span>
                    <input type="number" id="price-max" class="input filter-input price-range-input" placeholder="Max $" min="0" step="1">
                </div>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="components-main">
        <div class="components-toolbar">
            <h2 id="components-title">All Components</h2>
            <div class="toolbar-right">
                <div class="sort-controls">
                    <span class="sort-label">Sort by:</span>
                    <button class="sort-btn" id="sort-name-asc" data-sort="name" data-dir="asc" title="Name A-Z">Name ↑</button>
                    <button class="sort-btn" id="sort-price-asc" data-sort="price" data-dir="asc" title="Price: Low to High">Price ↑</button>
                    <button class="sort-btn" id="sort-price-desc" data-sort="price" data-dir="desc" title="Price: High to Low">Price ↓</button>
                </div>
                <button class="btn btn-primary" id="btn-add-component">+ Add Component</button>
            </div>
        </div>

        <div id="components-list" class="card-grid">
            <div class="loading"><div class="spinner"></div><p>Loading components...</p></div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </main>
</div>

<!-- Component Modal -->
<div id="component-modal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h3 id="component-modal-title">Add Component</h3>
            <button class="modal-close" data-close="component-modal">&times;</button>
        </div>
        <form id="component-form" class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-name">Name *</label>
                    <input type="text" id="comp-name" class="input" required>
                </div>
                <div class="form-group">
                    <label for="comp-brand">Brand *</label>
                    <input type="text" id="comp-brand" class="input" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-type">Type *</label>
                    <select id="comp-type" class="input" required>
                        <option value="">Select type</option>
                        <option value="CPU">CPU</option>
                        <option value="GPU">GPU</option>
                        <option value="MOTHERBOARD">Motherboard</option>
                        <option value="RAM">RAM</option>
                        <option value="PSU">PSU</option>
                        <option value="CASE">Case</option>
                        <option value="COOLER">Cooler</option>
                        <option value="STORAGE">Storage</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comp-price">Price ($)</label>
                    <input type="number" id="comp-price" class="input" step="0.01" min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="comp-power">Power (W)</label>
                    <input type="number" id="comp-power" class="input" min="0">
                </div>
                <div class="form-group">
                    <label for="comp-image">Image URL</label>
                    <input type="url" id="comp-image" class="input" placeholder="https://...">
                </div>
            </div>

            <!-- Dynamic detail fields -->
            <div id="detail-fields"></div>

            <input type="hidden" id="comp-edit-id">
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-close="component-modal">Cancel</button>
                <button type="submit" class="btn btn-primary" id="comp-submit-btn">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="components.js"></script>
</body>
</html>
